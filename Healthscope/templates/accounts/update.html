{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
  .profile-bg {
    background: url("{% static 'images/cb4259f1-ead6-4c1f-8419-a1007e14f349.jpeg' %}") no-repeat center center/cover;
    min-height: 100vh;
    padding: 40px 0;
  }
</style>


  <div class="profile-bg">
    <div class="container mt-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h2 class="text-center mb-4 fw-bold"><i>Update the personal details</i></h2>

          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- NAME -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control" name="name" placeholder="Enter your name" required />
            </div>

            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label"><i>Username</i></label>
              <input type="text" class="form-control" name="username" id="exampleInputEmail1" aria-describedby="emailHelp" />
            </div>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email address</label>
              <input type="email" class="form-control" name="email" id="exampleInputEmail1" aria-describedby="emailHelp" />
              <div id="emailHelp" class="form-text">Please enter your email address here!.</div>
            </div>
            <div class="mb-3">
              <label for="exampleInputPassword1" class="form-label"><i>Password</i></label>
              <input type="password" class="form-control" name="password" id="exampleInputPassword1" />
            </div>

            <!-- AGE -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Age</label>
              <input type="number" class="form-control" name="age" min="1" max="120" placeholder="Enter your age" required />
            </div>

            <!-- GENDER -->
            <div class="col-md-4 mt-3">
              <label class="form-label fw-semibold">Gender</label>
              <select name="gender" class="form-select">
                <option value="">Select Gender</option>

                <!-- Common -->
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>

            <!-- DOB -->
            <h5 class="mt-4 mb-3 fw-bold">Date of Birth</h5>

            <div class="row g-3">
              <!-- DAY -->
              <div class="col-md-4">
                <label class="form-label">Day</label>
                <select id="day" name="day" class="form-select" required>
                  <option value="">Select Day</option>
                </select>
              </div>

              <!-- MONTH -->
              <div class="col-md-4">
                <label class="form-label">Month</label>
                <select id="month" name="month" class="form-select" required>
                  <option value="">Select Month</option>
                  <option value="1">January</option>
                  <option value="2">February</option>
                  <option value="3">March</option>
                  <option value="4">April</option>
                  <option value="5">May</option>
                  <option value="6">June</option>
                  <option value="7">July</option>
                  <option value="8">August</option>
                  <option value="9">September</option>
                  <option value="10">October</option>
                  <option value="11">November</option>
                  <option value="12">December</option>
                </select>
              </div>

              <!-- YEAR -->
              <div class="col-md-4">
                <label class="form-label">Year</label>
                <input type="number" id="year" name="year" class="form-control" min="1900" max="2099" placeholder="YYYY" required />
              </div>
            </div>

            <!-- HEIGHT / WEIGHT / BLOOD -->
            <div class="row g-3 mt-3">
              <div class="col-md-4">
                <label class="form-label">Height (cm)</label>
                <input type="number" name="height" class="form-control" min="50" max="250" placeholder="e.g. 170" />
              </div>

              <div class="col-md-4">
                <label class="form-label">Weight (kg)</label>
                <input type="number" name="weight" class="form-control" min="20" max="200" placeholder="e.g. 65" />
              </div>

              <div class="col-md-4">
                <label class="form-label">Blood Group</label>
                <select name="blood_group" class="form-select">
                  <option value="">Select</option>
                  <option>A+</option>
                  <option>A-</option>
                  <option>B+</option>
                  <option>B-</option>
                  <option>AB+</option>
                  <option>AB-</option>
                  <option>O+</option>
                  <option>O-</option>
                </select>
              </div>
            </div>

            <!-- COMMENTS -->
            <div class="form-floating mt-3">
              <textarea class="form-control" name="comment" id="floatingTextarea" placeholder="Leave a comment here"></textarea>
              <label for="floatingTextarea">Tell us about any past illnesses, allergies, or health conditions you have experienced.</label>
            </div>

            <!-- SUBMIT -->
            <div class="mt-4">
              <button type="submit" class="btn btn-primary w-100 fw-bold">Save Details</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- JS SAFE LOAD -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const daySelect = document.getElementById('day')
      const monthSelect = document.getElementById('month')
      const yearInput = document.getElementById('year')
    
      function updateDays() {
        let month = parseInt(monthSelect.value)
        let year = parseInt(yearInput.value) || new Date().getFullYear()
    
        let days = 31
    
        if ([4, 6, 9, 11].includes(month)) {
          days = 30
        } else if (month === 2) {
          if ((year % 4 === 0 && year % 100 !== 0) || year % 400 === 0) {
            days = 29
          } else {
            days = 28
          }
        }
    
        daySelect.innerHTML = '<option value="">Select Day</option>'
    
        for (let i = 1; i <= days; i++) {
          let option = document.createElement('option')
          option.value = i
          option.textContent = i
          daySelect.appendChild(option)
        }
      }
    
      monthSelect.addEventListener('change', updateDays)
      yearInput.addEventListener('input', updateDays)
    })
  </script>
{% endblock %}
